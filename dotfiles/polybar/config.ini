include-file = ~/.config/polybar/colors.ini

[bar/main]
width              = 100%
height             = 28
fixed-center       = true
background         = ${colors.bg}
foreground         = ${colors.fg}
border-bottom-size = 1
border-color       = ${colors.border}
padding-left       = 2
padding-right      = 2
module-margin      = 1
font-0             = JetBrainsMono Nerd Font:size=10;2
modules-left       = bspwm title
modules-center     = date
modules-right      = network battery pipewire powermenu
enable-ipc         = true
cursor-click  = pointer

[module/bspwm]
type                         = internal/bspwm
pin-workspaces               = true
inline-mode                  = false
enable-click                 = true
enable-scroll                = true
reverse-scroll               = false
label-focused                = %name%
label-focused-foreground     = ${colors.accent}
label-focused-underline      = ${colors.accent}
label-focused-padding        = 1
label-occupied               = %name%
label-occupied-foreground    = ${colors.blue}
label-occupied-underline     = ${colors.blue}
label-occupied-padding       = 1
label-empty                  = %name%
label-empty-foreground       = ${colors.muted}
label-empty-padding          = 1
label-urgent                 = %name%
label-urgent-foreground      = ${colors.urgent}
label-urgent-padding         = 1
label-focused-cursor    = pointer
label-occupied-cursor   = pointer
label-empty-cursor      = pointer

[module/title]
type             = internal/xwindow
label            = %{F#2e2a24}│%{F-}  %title:0:40:%
label-foreground = ${colors.muted}

[module/date]
type             = internal/date
interval         = 30
date             = %a %d %b
time     = %I:%M %p 
time-alt = %A, %d %B %Y
label            = %{F#c8b89a}%time%%{F-}  %{F#6b6257}%date%%{F-}
cursor-click  = pointer

[module/network]
type              = internal/network
interface         = enp3s0          ; ← adapter avec `ip link`
interval          = 3
label-connected   = %{F#7a8fa8}↓%{F-} %downspeed:5%  %{F#4a4540}↑%{F-} %upspeed:5%
label-disconnected = %{F#8a4a3c}offline%{F-}

[module/battery]
type              = internal/battery
battery           = BAT0
adapter           = AC
full-at           = 99
low-at            = 15
label-charging    = %{F#8fa88c}⚡%{F-} %percentage%%
label-discharging = %{F#6b6257}▸%{F-} %percentage%%
label-full        = %{F#8fa88c}●%{F-}
label-low         = %{F#8a4a3c}▸%{F-} %percentage%%

[module/pipewire]
type             = custom/script
exec = wpctl get-volume @DEFAULT_AUDIO_SINK@ 2>/dev/null | awk '{v=$2*100; m=$3; if(m=="[MUTED]") printf "%%{F#4a4540}󰝟%%{F-} muted"; else printf "%%{F#a87d4a}󰕾%%{F-} %d%%", v}'
interval         = 3
click-right      = pavucontrol &
scroll-up        = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
scroll-down      = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
click-left       = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
cursor-click  = pointer
cursor-scroll = pointer

[module/powermenu]
type             = custom/text
content          = %{F#8a4a3c}⏻%{F-}
content-padding  = 1
click-left       = ~/.config/polybar/powermenu.sh &
cursor-click = pointer
